<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHUNAEIEI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#05010b;
color:white;
font-family:'Poppins',sans-serif;
overflow-x:hidden;
}

/* STAR BACKGROUND */
#stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* NAV */
.navbar{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 15px;
background:rgba(0,0,0,0.6);
border-bottom:1px solid #8b2cff;
z-index:9999;
}

.nav-left{
display:flex;
align-items:center;
gap:10px;
}

.logo-p{
width:38px;
height:38px;
display:flex;
align-items:center;
justify-content:center;
background:#140022;
border:2px solid #8b2cff;
border-radius:10px;
font-family:Orbitron;
}

/* ☰ */
.menu-toggle{
font-size:30px;
cursor:pointer;
position:relative;
z-index:10000;
}

/* OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:9998;
}
.overlay.active{display:block;}

/* MENU */
.side-menu{
position:fixed;
top:0;
right:-260px;
width:240px;
height:100vh;
background:#0d0018;
border-left:1px solid #8b2cff;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
transition:0.3s;
z-index:9999;
}
.side-menu.active{right:0;}

.side-menu a{
color:white;
text-decoration:none;
padding:10px;
background:#140022;
border-radius:10px;
border:1px solid #8b2cff;
}

/* MENU HEADER */
.menu-header{
text-align:center;
font-family:Orbitron;
color:#d9b3ff;
border-bottom:1px solid #8b2cff;
padding-bottom:8px;
margin-bottom:10px;
}

/* MENU FOOTER © */
.menu-footer{
margin-top:auto;
text-align:center;
font-size:12px;
opacity:0.7;
border-top:1px solid #8b2cff;
padding-top:10px;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:0 15px;
}

.logo-big{
width:85px;
height:85px;
display:flex;
align-items:center;
justify-content:center;
background:#140022;
border:2px solid #8b2cff;
border-radius:18px;
font-family:Orbitron;
font-size:34px;
box-shadow:0 0 20px #8b2cff;
}

.hero h2{
font-family:Orbitron;
font-size:clamp(28px,6vw,60px);
}

/* MID TEXT */
.mid-text{
margin-top:10px;
font-size:12px;
letter-spacing:3px;
opacity:0.6;
}

/* LIVE */
.live-card{
margin-top:15px;
padding:8px 14px;
border:1px solid #8b2cff;
border-radius:10px;
background:rgba(20,0,34,0.5);
}

/* STATS */
.section-title{
text-align:center;
margin:40px 0 15px;
font-family:Orbitron;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
padding:15px;
}

.stat-box{
background:#0d0018;
border:1px solid #8b2cff;
padding:18px;
border-radius:14px;
text-align:center;
}

.stat-box p{
font-size:28px;
font-family:Orbitron;
}

/* FOOTER */
footer{
text-align:center;
padding:25px;
border-top:1px solid #8b2cff;
margin-top:20px;
}

</style>
</head>

<body>

<!-- STAR -->
<canvas id="stars"></canvas>

<!-- NAV -->
<div class="navbar">

<div class="nav-left">
<div class="logo-p">P</div>
<h1>PHUNAEIEI</h1>
</div>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- MENU -->
<div class="side-menu" id="menu">

<div class="menu-header">MENU</div>

<a href="#home">HOME</a>
<a href="#stats">STATS</a>
<a href="#profile">PROFILE</a>

<div class="menu-footer">© PHUNAEIEI 2026</div>

</div>

<!-- HERO -->
<section class="hero">

<div class="logo-big">P</div>

<h2>PHUNAEIEI</h2>

<div class="mid-text">CREATOR • MODS • LIVE STREAM</div>

<div class="live-card">
🔥 LIVE • <span id="followers">173</span> Followers
</div>

</section>

<!-- STATS -->
<h2 class="section-title">STATS</h2>

<div class="stats">

<div class="stat-box">
<h3>FOLLOWERS</h3>
<p id="followers2">173</p>
</div>

<div class="stat-box">
<h3>VIDEOS</h3>
<p>6</p>
</div>

<div class="stat-box">
<h3>VIEWS</h3>
<p>10K</p>
</div>

</div>

<!-- FOOTER -->
<footer>
<p>@phunaeiei3</p>
</footer>

<script>

/* MENU */
const menu=document.getElementById("menu");
const overlay=document.getElementById("overlay");

function toggleMenu(){
menu.classList.toggle("active");
overlay.classList.toggle("active");
}

function closeMenu(){
menu.classList.remove("active");
overlay.classList.remove("active");
}

/* FOLLOWERS LIVE */
let base=173;
let f=173;

setInterval(()=>{
f += Math.floor(Math.random()*3)-1;

if(f > base + 6) f = base + 6;
if(f < base - 6) f = base - 6;

document.getElementById("followers").innerText=f;
document.getElementById("followers2").innerText=f;

},900);

/* STAR */
const c=document.getElementById("stars");
const x=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let s=[];
for(let i=0;i<120;i++){
s.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.5});
}

function draw(){
x.clearRect(0,0,c.width,c.height);
x.fillStyle="white";
for(let i of s){
x.beginPath();
x.arc(i.x,i.y,i.r,0,Math.PI*2);
x.fill();
i.y+=0.6;
if(i.y>c.height)i.y=0;
}
requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
