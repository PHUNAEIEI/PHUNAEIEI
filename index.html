<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PHUNAEIEI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
background:#05010b;
color:white;
font-family:'Poppins',sans-serif;
overflow-x:hidden;
}

/* 🌌 STAR */
#stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
pointer-events:none;
}

/* NAV */
.navbar{
position:fixed;
top:0;
left:0;
width:100%;
padding:10px 15px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
border-bottom:1px solid #8b2cff;
z-index:9999;
}

.nav-left{
display:flex;
align-items:center;
gap:10px;
}

.logo-p{
width:38px;
height:38px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
border:2px solid #8b2cff;
box-shadow:0 0 10px #8b2cff;
background:#140022;
font-family:'Orbitron';
font-size:16px;
}

.nav-left h1{
font-size:14px;
font-family:'Orbitron';
opacity:0.9;
}

/* ☰ MENU BUTTON (FIXED) */
.menu-toggle{
font-size:30px;
cursor:pointer;
user-select:none;
position:relative;
z-index:10010;
color:white;
}

/* OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:9998;
}
.overlay.active{display:block;}

/* SIDE MENU */
.side-menu{
position:fixed;
top:0;
right:-260px;
width:240px;
height:100vh;
background:#0d0018;
border-left:1px solid #8b2cff;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
transition:0.3s ease;
z-index:9999;
}
.side-menu.active{right:0;}

.side-menu a{
color:white;
text-decoration:none;
padding:10px;
background:#140022;
border-radius:10px;
border:1px solid #8b2cff;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:0 15px;
}

.logo-big{
width:80px;
height:80px;
display:flex;
align-items:center;
justify-content:center;
border-radius:20px;
font-size:34px;
font-family:'Orbitron';
background:#140022;
border:2px solid #8b2cff;
box-shadow:0 0 25px #8b2cff;
margin-bottom:10px;
}

.hero h2{
font-size:clamp(34px,8vw,72px);
font-family:'Orbitron';
color:#f2d4ff;
text-shadow:0 0 10px #8b2cff;
}

.hero-sub{
margin-top:8px;
font-size:13px;
opacity:0.7;
letter-spacing:2px;
}

.hero-btns{
margin-top:18px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.hero-btns a{
padding:10px 14px;
background:#8b2cff;
color:white;
text-decoration:none;
border-radius:10px;
font-size:12px;
}

/* LIVE */
.live-card{
margin-top:18px;
padding:8px 14px;
border:1px solid #8b2cff;
border-radius:12px;
background:rgba(20,0,34,0.6);
font-size:12px;
display:inline-block;
animation:glow 1.5s infinite;
}

.live-card::before{
content:"●";
color:red;
margin-right:6px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0.2;}
100%{opacity:1;}
}

@keyframes glow{
0%{box-shadow:0 0 5px rgba(255,0,0,0.3);}
50%{box-shadow:0 0 15px rgba(255,0,0,0.7);}
100%{box-shadow:0 0 5px rgba(255,0,0,0.3);}
}

/* SECTION */
.section-title{
text-align:center;
margin:50px 0 15px;
font-family:'Orbitron';
}

/* STATS */
.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
padding:15px;
}

.stat-box{
background:#0d0018;
border:1px solid #8b2cff;
padding:18px;
border-radius:16px;
text-align:center;
}

.stat-box p{
font-size:28px;
font-family:'Orbitron';
}

/* VIDEOS */
.slider{
display:flex;
gap:12px;
overflow-x:auto;
padding:15px;
}

.video-card{
min-width:220px;
background:#0d0018;
border:1px solid #8b2cff;
border-radius:16px;
overflow:hidden;
}

/* CHALLENGE */
.challenge{
margin:15px;
padding:20px;
background:#0d0018;
border:1px solid #8b2cff;
border-radius:16px;
text-align:center;
}

.bar{
height:18px;
background:#2a1240;
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.progress{
width:72%;
height:100%;
background:#8b2cff;
}

/* FOOTER */
footer{
text-align:center;
padding:30px;
border-top:1px solid #8b2cff;
margin-top:30px;
}

</style>
</head>

<body>

<!-- STAR -->
<canvas id="stars"></canvas>

<!-- NAV -->
<div class="navbar">

<div class="nav-left">
<div class="logo-p">P</div>
<h1>PHUNAEIEI</h1>
</div>

<div class="menu-toggle" id="btn" onclick="toggleMenu()">☰</div>

</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- MENU -->
<div class="side-menu" id="menu">

<a href="#home">HOME</a>
<a href="#stats">STATS</a>
<a href="#videos">VIDEOS</a>
<a href="#challenge">CHALLENGE</a>

</div>

<!-- HERO -->
<section class="hero">

<div class="logo-big">P</div>

<h2>PHUNAEIEI</h2>

<p class="hero-sub">Minecraft Creator • Mods • Live Streams</p>

<div class="hero-btns">
<a href="#videos">WATCH</a>
<a href="#stats">STATS</a>
</div>

<div class="live-card">
🔥 LIVE • <span id="followers">173</span> Followers
</div>

</section>

<!-- STATS -->
<h2 class="section-title">STATS</h2>

<div class="stats">

<div class="stat-box">
<h3>FOLLOWERS</h3>
<p id="followers2">173</p>
</div>

<div class="stat-box"><h3>VIDEOS</h3><p>6</p></div>
<div class="stat-box"><h3>VIEWS</h3><p>10K</p></div>

</div>

<!-- CHALLENGE -->
<div class="challenge">
<h2>7 DAYS STREAM</h2>
<div class="bar"><div class="progress"></div></div>
</div>

<footer>
<p>@phunaeiei3</p>
</footer>

<script>

/* MENU FIX 100% */
const menu=document.getElementById("menu");
const overlay=document.getElementById("overlay");
const btn=document.getElementById("btn");

function toggleMenu(){
menu.classList.toggle("active");
overlay.classList.toggle("active");
btn.innerHTML = menu.classList.contains("active") ? "✕" : "☰";
}

function closeMenu(){
menu.classList.remove("active");
overlay.classList.remove("active");
btn.innerHTML="☰";
}

/* LIVE FOLLOWERS */
let base = 173;
let f = 173;

setInterval(()=>{
f += Math.floor(Math.random()*3)-1;

if(f > base + 6) f = base + 6;
if(f < base - 6) f = base - 6;

document.getElementById("followers").innerText = f;
if(document.getElementById("followers2"))
document.getElementById("followers2").innerText = f;

},800);

/* STARS */
const c=document.getElementById("stars");
const x=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let s=[];
for(let i=0;i<140;i++){
s.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.8});
}

function draw(){
x.clearRect(0,0,c.width,c.height);
x.fillStyle="white";
for(let i of s){
x.beginPath();
x.arc(i.x,i.y,i.r,0,Math.PI*2);
x.fill();
i.y+=0.8;
if(i.y>c.height)i.y=0;
}
requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
