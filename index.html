<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PHUNAEIEI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
background:#05010b;
color:white;
font-family:'Poppins',sans-serif;
overflow-x:hidden;
}

/* ================= NAVBAR (เล็กลงแล้ว) ================= */
.navbar{
position:fixed;
top:0;
left:0;
width:100%;
padding:10px 20px; /* 🔥 เล็กลง */
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(10px);
border-bottom:1px solid #8b2cff;
z-index:9999;
}

.nav-left{
display:flex;
align-items:center;
gap:10px;
}

/* 🔥 โลโก้เล็กลง */
.logo-p{
width:40px;
height:40px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
border:2px solid #8b2cff;
box-shadow:0 0 12px #8b2cff;
font-family:'Orbitron';
font-size:18px;
color:#f2d4ff;
background:#140022;
}

/* 🔥 ตัวหนังสือเล็กลง */
.nav-left h1{
font-family:'Orbitron';
font-size:18px;
color:#f2d4ff;
}

.menu{
display:flex;
gap:10px;
}

.menu a{
color:white;
text-decoration:none;
padding:6px 10px;
border-radius:8px;
background:#140022;
border:1px solid #8b2cff;
transition:0.3s;
font-size:13px;
}

.menu a:hover{
background:#8b2cff;
}

/* 🔥 3 ขีดเล็กลง */
.menu-toggle{
font-size:24px;
cursor:pointer;
color:#f2d4ff;
display:none;
}

/* mobile menu */
.mobile-menu{
position:absolute;
top:60px;
right:15px;
background:#0d0018;
border:1px solid #8b2cff;
border-radius:12px;
padding:10px;
display:none;
flex-direction:column;
gap:8px;
z-index:9999;
}

.mobile-menu a{
color:white;
text-decoration:none;
padding:8px 12px;
border-radius:8px;
background:#140022;
}

/* ================= HERO ================= */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1511512578047-dfb367046420');
background-size:cover;
}

.glow-wrap{
position:relative;
display:inline-block;
margin-bottom:20px;
}

.logo-big{
width:90px;
height:90px;
display:flex;
align-items:center;
justify-content:center;
border-radius:20px;
font-family:'Orbitron';
font-size:40px;
color:#f2d4ff;
background:#140022;
border:2px solid #8b2cff;
position:relative;
z-index:2;
}

.glow-wrap::before{
content:"";
position:absolute;
top:-10px;
left:-10px;
right:-10px;
bottom:-10px;
border-radius:30px;
background:conic-gradient(#8b2cff,#d946ef,#00f0ff,#8b2cff);
animation:spin 2.5s linear infinite;
filter:blur(6px);
z-index:1;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.hero h2{
font-size:70px;
font-family:'Orbitron';
color:#f2d4ff;
}

/* ================= SECTION ================= */
.section-title{
text-align:center;
margin:60px 0 20px;
font-family:'Orbitron';
color:#f2d4ff;
}

/* ================= STATS ================= */
.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.stat-box{
background:#0d0018;
border:1px solid #8b2cff;
padding:30px;
border-radius:20px;
text-align:center;
}

.stat-box p{
font-size:40px;
font-family:'Orbitron';
color:#d9b3ff;
}

/* ================= VIDEOS ================= */
.slider{
display:flex;
gap:20px;
overflow-x:auto;
padding:20px;
}

.video-card{
min-width:300px;
background:#0d0018;
border:1px solid #8b2cff;
border-radius:20px;
overflow:hidden;
}

.video-card img{
width:100%;
height:200px;
object-fit:cover;
}

.video-content{
padding:15px;
}

.watch-btn{
display:inline-block;
margin-top:10px;
background:#8b2cff;
padding:10px 15px;
border-radius:10px;
color:white;
text-decoration:none;
}

/* ================= CHALLENGE ================= */
.challenge{
margin:30px;
padding:40px;
background:#0d0018;
border:1px solid #8b2cff;
border-radius:25px;
text-align:center;
}

.bar{
height:25px;
background:#2a1240;
border-radius:20px;
margin-top:20px;
overflow:hidden;
}

.progress{
width:72%;
height:100%;
background:#8b2cff;
}

/* ================= FOOTER ================= */
footer{
text-align:center;
padding:40px;
border-top:1px solid #8b2cff;
margin-top:50px;
}

/* ================= MOBILE ================= */
@media (max-width:768px){

.menu{display:none;}
.menu-toggle{display:block;}

.hero h2{font-size:40px;}

.logo-big{
width:70px;
height:70px;
font-size:28px;
}

.stats{
grid-template-columns:1fr;
}

}

/* mobile menu open */
.show{
display:flex !important;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

<div class="nav-left">

<div class="logo-p">P</div>

<h1>PHUNAEIEI</h1>

</div>

<div class="menu">
<a href="#home">HOME</a>
<a href="#stats">STATS</a>
<a href="#videos">VIDEOS</a>
<a href="#challenge">CHALLENGE</a>
</div>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<div id="mobileMenu" class="mobile-menu">
<a href="#home" onclick="toggleMenu()">HOME</a>
<a href="#stats" onclick="toggleMenu()">STATS</a>
<a href="#videos" onclick="toggleMenu()">VIDEOS</a>
<a href="#challenge" onclick="toggleMenu()">CHALLENGE</a>
</div>

</div>

<!-- HERO -->
<section class="hero" id="home">

<div class="glow-wrap">
  <div class="logo-big">P</div>
</div>

<h2>PHUNAEIEI</h2>

</section>

<!-- STATS -->
<h2 class="section-title" id="stats">STATS</h2>

<div class="stats">

<div class="stat-box"><h3>FOLLOWERS</h3><p>120K</p></div>
<div class="stat-box"><h3>VIDEOS</h3><p>157</p></div>
<div class="stat-box"><h3>VIEWS</h3><p>9.4M</p></div>

</div>

<!-- VIDEOS -->
<h2 class="section-title" id="videos">VIDEOS</h2>

<div class="slider">

<div class="video-card">
<img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
<div class="video-content">
<h3>1 DAY 1 MOD</h3>
<a class="watch-btn">WATCH</a>
</div>
</div>

<div class="video-card">
<img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
<div class="video-content">
<h3>HORROR MOD</h3>
<a class="watch-btn">WATCH</a>
</div>
</div>

<div class="video-card">
<img src="https://images.unsplash.com/photo-1493711662062-fa541adb3fc8">
<div class="video-content">
<h3>PVP PACK</h3>
<a class="watch-btn">WATCH</a>
</div>
</div>

<div class="video-card">
<img src="https://images.unsplash.com/photo-1560253023-3ec5d502959f">
<div class="video-content">
<h3>LIVE CHALLENGE</h3>
<a class="watch-btn">WATCH</a>
</div>
</div>

</div>

<!-- CHALLENGE -->
<div class="challenge" id="challenge">

<h2>7 DAYS STREAMING</h2>
<p>Goal 100K Followers</p>

<div class="bar"><div class="progress"></div></div>

</div>

<!-- FOOTER -->
<footer>
<p>@phunaeiei3</p>
</footer>

<script>
function toggleMenu(){
document.getElementById("mobileMenu").classList.toggle("show");
}
</script>

</body>
</html>
