<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Live Followers</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Arial', sans-serif;
            background: radial-gradient(circle at center, #2a004f, #000);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        .glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: rgba(170, 0, 255, 0.2);
            filter: blur(120px);
            border-radius: 50%;
            z-index: 0;
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(160, 0, 255, 0.2);
            width: 280px;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        h2 {
            font-size: 60px;
            margin: 0;
            color: #ff4dff;
            text-shadow: 0 0 20px rgba(255, 77, 255, 0.6);
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="card">
        <h1>TikTok Followers</h1>
        <h2 id="count">0</h2>
    </div>

    <script>
        let countEl = document.getElementById("count");
        let fake = 1234;

        function update() {
            // สุ่มเพิ่มตัวเลขให้ดูมีการเคลื่อนไหว
            fake += Math.floor(Math.random() * 2);
            countEl.innerText = fake.toLocaleString();
        }

        update();
        setInterval(update, 2000);
    </script>

</body>
</html>
