<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PHUNAEIEI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
background:#05010b;
color:white;
font-family:'Poppins',sans-serif;
overflow-x:hidden;
}

/* 🌌 STAR BACKGROUND */
canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* NAV */
.navbar{
position:fixed;
top:0;
left:0;
width:100%;
padding:10px 20px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
border-bottom:1px solid #8b2cff;
z-index:9999;
}

.nav-left{
display:flex;
align-items:center;
gap:10px;
}

.logo-p{
width:40px;
height:40px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
border:2px solid #8b2cff;
box-shadow:0 0 12px #8b2cff;
font-family:'Orbitron';
font-size:18px;
background:#140022;
color:#fff;
}

.nav-left h1{
font-family:'Orbitron';
font-size:18px;
}

/* ☰ */
.menu-toggle{
font-size:28px;
cursor:pointer;
z-index:10001;
position:relative;
}

/* ================= SLIDE MENU ================= */
.side-menu{
position:fixed;
top:0;
right:-260px;
width:240px;
height:100vh;
background:#0d0018;
border-left:1px solid #8b2cff;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
transition:0.3s ease;
z-index:10000;
}

.side-menu a{
color:white;
text-decoration:none;
padding:10px;
background:#140022;
border-radius:8px;
border:1px solid #8b2cff;
}

.side-menu.active{
right:0;
}

/* overlay */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:9999;
}

.overlay.active{
display:block;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.logo-big{
width:90px;
height:90px;
display:flex;
align-items:center;
justify-content:center;
border-radius:20px;
font-size:40px;
font-family:'Orbitron';
background:#140022;
border:2px solid #8b2cff;
}

.hero h2{
font-size:60px;
font-family:'Orbitron';
}

/* LIVE */
.live-wrap{
display:flex;
align-items:center;
justify-content:center;
gap:8px;
margin-bottom:10px;
width:100%;
}

.live-dot{
width:10px;
height:10px;
background:red;
border-radius:50%;
animation:blink 1s infinite;
box-shadow:0 0 10px red;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0.2;}
100%{opacity:1;}
}

.live-text{
color:red;
font-family:'Orbitron';
}

/* STATS */
.section-title{
text-align:center;
margin:60px 0 20px;
font-family:'Orbitron';
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.stat-box{
background:#0d0018;
border:1px solid #8b2cff;
padding:25px;
border-radius:20px;
text-align:center;
}

.stat-box p{
font-size:38px;
font-family:'Orbitron';
}

/* VIDEOS */
.slider{
display:flex;
gap:20px;
overflow-x:auto;
padding:20px;
}

.video-card{
min-width:280px;
background:#0d0018;
border:1px solid #8b2cff;
border-radius:20px;
overflow:hidden;
}

.video-card img{
width:100%;
height:180px;
object-fit:cover;
}

.video-content{
padding:15px;
}

.watch-btn{
display:inline-block;
margin-top:10px;
background:#8b2cff;
padding:10px 14px;
border-radius:10px;
color:white;
text-decoration:none;
}

/* CHALLENGE */
.challenge{
margin:25px;
padding:30px;
background:#0d0018;
border:1px solid #8b2cff;
border-radius:20px;
text-align:center;
}

.bar{
height:20px;
background:#2a1240;
border-radius:20px;
overflow:hidden;
margin-top:15px;
}

.progress{
width:72%;
height:100%;
background:#8b2cff;
}

/* FOOTER */
footer{
text-align:center;
padding:40px;
border-top:1px solid #8b2cff;
margin-top:40px;
}

</style>
</head>

<body>

<!-- 🌌 STAR -->
<canvas id="stars"></canvas>

<!-- NAV -->
<div class="navbar">

<div class="nav-left">
<div class="logo-p">P</div>
<h1>PHUNAEIEI</h1>
</div>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

</div>

<!-- SLIDE MENU -->
<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div id="sideMenu" class="side-menu">
<a href="#home" onclick="toggleMenu()">HOME</a>
<a href="#stats" onclick="toggleMenu()">STATS</a>
<a href="#videos" onclick="toggleMenu()">VIDEOS</a>
<a href="#challenge" onclick="toggleMenu()">CHALLENGE</a>
</div>

<!-- HERO -->
<section class="hero">

<div class="logo-big">P</div>

<h2>PHUNAEIEI</h2>

</section>

<!-- STATS -->
<h2 class="section-title">STATS</h2>

<div class="stats">

<div class="stat-box">

<div class="live-wrap">
<div class="live-dot"></div>
<div class="live-text">LIVE</div>
</div>

<h3>FOLLOWERS</h3>
<p id="followers">173</p>

</div>

<div class="stat-box"><h3>VIDEOS</h3><p>6</p></div>
<div class="stat-box"><h3>VIEWS</h3><p>10K</p></div>

</div>

<!-- VIDEOS -->
<h2 class="section-title">VIDEOS</h2>

<div class="slider">

<div class="video-card">
<img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
<div class="video-content">
<h3>MOD 1</h3>
<a class="watch-btn">WATCH</a>
</div>
</div>

<div class="video-card">
<img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
<div class="video-content">
<h3>MOD 2</h3>
<a class="watch-btn">WATCH</a>
</div>
</div>

</div>

<!-- CHALLENGE -->
<div class="challenge">
<h2>7 DAYS STREAM</h2>
<div class="bar"><div class="progress"></div></div>
</div>

<footer>
<p>@phunaeiei3</p>
</footer>

<script>

/* ☰ MENU */
function toggleMenu(){
document.getElementById("sideMenu").classList.toggle("active");
document.getElementById("overlay").classList.toggle("active");
}

/* FOLLOWERS LIVE */
let base = 173;
let followers = 173;

function liveFollowers(){

let change = Math.floor(Math.random()*5)-2;
followers += change;

if(followers > base + 3) followers = base + 3;
if(followers < base - 3) followers = base - 3;

document.getElementById("followers").innerText = followers;

setTimeout(liveFollowers, 900);
}

liveFollowers();

/* 🌌 STARS */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<120;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
d:Math.random()*1
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";

for(let s of stars){
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();

s.y += s.d;

if(s.y > canvas.height){
s.y = 0;
s.x = Math.random()*canvas.width;
}
}
}

function animate(){
draw();
requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
