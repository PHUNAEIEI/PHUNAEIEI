<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PHUNAEIEI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
background:#05010b;
font-family:'Poppins',sans-serif;
color:white;
overflow-x:hidden;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
left:0;
width:100%;
padding:18px 40px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
border-bottom:1px solid #8b2cff;
z-index:1000;
}

.nav-left{
display:flex;
align-items:center;
gap:15px;
}

.nav-left img{
width:50px;
height:50px;
border-radius:14px;
border:2px solid #8b2cff;
box-shadow:0 0 15px #8b2cff;
object-fit:cover;
}

.nav-left h1{
font-family:'Orbitron',sans-serif;
font-size:26px;
color:#f2d4ff;
}

.menu{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.menu a{
text-decoration:none;
color:white;
padding:10px 18px;
border-radius:12px;
background:#140022;
border:1px solid #8b2cff;
transition:0.3s;
font-size:14px;
}

.menu a:hover{
background:#8b2cff;
transform:translateY(-3px);
box-shadow:0 0 15px #8b2cff;
}

/* HERO */

.hero{
height:100vh;
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1511512578047-dfb367046420');
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
border-bottom:2px solid #8b2cff;
}

.hero img{
width:130px;
height:130px;
border-radius:30px;
border:3px solid #8b2cff;
box-shadow:0 0 35px #8b2cff;
margin-bottom:25px;
object-fit:cover;
}

.hero h2{
font-size:90px;
font-family:'Orbitron',sans-serif;
color:#f2d4ff;
text-shadow:
0 0 10px #8b2cff,
0 0 20px #8b2cff,
0 0 40px #8b2cff;
}

.hero p{
margin-top:15px;
font-size:22px;
letter-spacing:5px;
opacity:0.8;
}

.hero-buttons{
margin-top:40px;
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

.hero-buttons a{
padding:18px 38px;
text-decoration:none;
color:white;
font-weight:600;
border-radius:18px;
background:#8b2cff;
border:1px solid #c084ff;
box-shadow:0 0 20px rgba(139,44,255,0.5);
transition:0.3s;
}

.hero-buttons a:hover{
transform:scale(1.05);
background:#a855f7;
}

/* SECTION */

.section-title{
font-family:'Orbitron',sans-serif;
font-size:42px;
text-align:center;
margin:70px 0 35px;
color:#f2d4ff;
text-shadow:0 0 10px #8b2cff;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:0 30px;
}

.stat-box{
background:#0d0018;
border:1px solid #8b2cff;
padding:35px;
border-radius:24px;
text-align:center;
box-shadow:0 0 20px rgba(139,44,255,0.2);
transition:0.3s;
}

.stat-box:hover{
transform:translateY(-8px);
box-shadow:0 0 25px #8b2cff;
}

.stat-box h3{
margin-bottom:15px;
font-size:22px;
}

.stat-box p{
font-size:52px;
font-family:'Orbitron',sans-serif;
color:#d9b3ff;
}

/* VIDEO SLIDER */

.slider{
display:flex;
gap:25px;
overflow-x:auto;
padding:20px 30px 50px;
scroll-behavior:smooth;
}

.video-card{
min-width:320px;
background:#0d0018;
border-radius:24px;
overflow:hidden;
border:1px solid #8b2cff;
flex-shrink:0;
transition:0.3s;
}

.video-card:hover{
transform:translateY(-10px);
box-shadow:0 0 30px #8b2cff;
}

.video-card img{
width:100%;
height:220px;
object-fit:cover;
}

.video-content{
padding:20px;
}

/* CHALLENGE */

.challenge{
margin:40px 30px;
background:#0d0018;
padding:45px;
border-radius:30px;
border:1px solid #8b2cff;
text-align:center;
box-shadow:0 0 20px rgba(139,44,255,0.2);
}

/* FOOTER */

footer{
margin-top:70px;
padding:50px 20px;
text-align:center;
border-top:1px solid #8b2cff;
background:#090012;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<div class="nav-left">

<img src="https://cdn.discordapp.com/attachments/1483287253483782185/1502925774125006901/file_00000000184c720b8882374591789c9b.png">

<h1>PHUNAEIEI</h1>

</div>

<div class="menu">
<a href="#home">HOME</a>
<a href="#stats">STATS</a>
<a href="#videos">VIDEOS</a>
<a href="#challenge">CHALLENGE</a>
</div>

</div>

<!-- HERO -->
<section class="hero" id="home">

<img src="https://cdn.discordapp.com/attachments/1483287253483782185/1502925774125006901/file_00000000184c720b8882374591789c9b.png">

<h2>PHUNAEIEI</h2>
<p>MINECRAFT CREATOR & GAMING</p>

<div class="hero-buttons">
<a href="#">WATCH VIDEOS</a>
<a href="#">FOLLOW TIKTOK</a>
</div>

</section>

</body>
</html>
