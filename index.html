<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PHUNAEIEI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
background:#05010b;
color:white;
font-family:'Poppins',sans-serif;
overflow-x:hidden;
}

/* 🌌 STARS */
canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* NAV */
.navbar{
position:fixed;
top:0;
left:0;
width:100%;
padding:10px 15px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
border-bottom:1px solid #8b2cff;
z-index:9999;
}

.nav-left{
display:flex;
align-items:center;
gap:10px;
}

/* 🔥 TOP NAME FIX (เล็กลง) */
.nav-left h1{
font-size:clamp(12px,2.2vw,16px);
font-family:'Orbitron';
opacity:0.9;
}

/* LOGO */
.logo-p{
width:38px;
height:38px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
border:2px solid #8b2cff;
box-shadow:0 0 10px #8b2cff;
background:#140022;
font-family:'Orbitron';
font-size:16px;
}

/* ☰ */
.menu-toggle{
font-size:28px;
cursor:pointer;
user-select:none;
text-shadow:0 0 10px #8b2cff;
}

/* OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:9998;
}

.overlay.active{
display:block;
}

/* SIDE MENU */
.side-menu{
position:fixed;
top:0;
right:-260px;
width:240px;
height:100vh;
background:linear-gradient(180deg,#0d0018,#140022);
border-left:1px solid #8b2cff;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
transition:0.3s ease;
z-index:9999;
box-shadow:-10px 0 40px rgba(139,44,255,0.25);
}

.side-menu.active{
right:0;
}

.side-menu a{
color:white;
text-decoration:none;
padding:10px;
background:#140022;
border-radius:10px;
border:1px solid #8b2cff;
}

/* MENU HEADER */
.menu-header{
font-family:'Orbitron';
text-align:center;
font-size:16px;
color:#d9b3ff;
padding-bottom:10px;
border-bottom:1px solid #8b2cff;
}

/* MENU FOOTER */
.menu-footer{
margin-top:auto;
text-align:center;
font-size:12px;
opacity:0.7;
padding-top:10px;
border-top:1px solid #8b2cff;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:0 15px;
}

/* 🔥 MAIN NAME FIX (กลางใหญ่ขึ้นนิด + ไม่ล้น) */
.hero h2{
font-size:clamp(34px,8vw,72px);
font-family:'Orbitron';
color:#f2d4ff;
text-shadow:0 0 10px #8b2cff;
line-height:1.1;
word-break:break-word;
}

.logo-big{
width:80px;
height:80px;
display:flex;
align-items:center;
justify-content:center;
border-radius:20px;
font-size:34px;
font-family:'Orbitron';
background:#140022;
border:2px solid #8b2cff;
box-shadow:0 0 25px #8b2cff;
}

/* LIVE */
.live-wrap{
display:flex;
align-items:center;
justify-content:center;
gap:8px;
margin-bottom:10px;
}

.live-dot{
width:10px;
height:10px;
background:red;
border-radius:50%;
animation:blink 1s infinite;
box-shadow:0 0 10px red;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0.2;}
100%{opacity:1;}
}

.live-text{
color:red;
font-family:'Orbitron';
}

/* SECTION */
.section-title{
text-align:center;
margin:50px 0 15px;
font-family:'Orbitron';
font-size:clamp(18px,4vw,28px);
}

/* STATS */
.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
padding:15px;
}

.stat-box{
background:#0d0018;
border:1px solid #8b2cff;
padding:18px;
border-radius:16px;
text-align:center;
}

.stat-box p{
font-size:28px;
font-family:'Orbitron';
}

/* VIDEOS */
.slider{
display:flex;
gap:12px;
overflow-x:auto;
padding:15px;
}

.video-card{
min-width:220px;
background:#0d0018;
border:1px solid #8b2cff;
border-radius:16px;
overflow:hidden;
}

.video-card img{
width:100%;
height:160px;
object-fit:cover;
}

/* CHALLENGE */
.challenge{
margin:15px;
padding:20px;
background:#0d0018;
border:1px solid #8b2cff;
border-radius:16px;
text-align:center;
}

.bar{
height:18px;
background:#2a1240;
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.progress{
width:72%;
height:100%;
background:#8b2cff;
}

/* FOOTER */
footer{
text-align:center;
padding:30px;
border-top:1px solid #8b2cff;
margin-top:30px;
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<!-- NAV -->
<div class="navbar">

<div class="nav-left">
<div class="logo-p">P</div>
<h1>PHUNAEIEI</h1>
</div>

<div id="menuBtn" class="menu-toggle" onclick="toggleMenu()">☰</div>

</div>

<!-- OVERLAY -->
<div id="overlay" class="overlay"></div>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">

<div class="menu-header">MENU</div>

<a href="#home" onclick="closeMenu()">HOME</a>
<a href="#stats" onclick="closeMenu()">STATS</a>
<a href="#videos" onclick="closeMenu()">VIDEOS</a>
<a href="#challenge" onclick="closeMenu()">CHALLENGE</a>

<div class="menu-footer">© PHUNAEIEI 2026</div>

</div>

<!-- HERO -->
<section class="hero">

<div class="logo-big">P</div>

<h2>PHUNAEIEI</h2>

</section>

<!-- STATS -->
<h2 class="section-title">STATS</h2>

<div class="stats">

<div class="stat-box">

<div class="live-wrap">
<div class="live-dot"></div>
<div class="live-text">LIVE</div>
</div>

<h3>FOLLOWERS</h3>
<p id="followers">173</p>

</div>

<div class="stat-box"><h3>VIDEOS</h3><p>6</p></div>
<div class="stat-box"><h3>VIEWS</h3><p>10K</p></div>

</div>

<!-- VIDEOS -->
<h2 class="section-title">LATEST VIDEOS</h2>

<div class="slider">

<div class="video-card">
<img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
<div class="video-content">
<h3>MOD 1</h3>
<a class="watch-btn">WATCH</a>
</div>
</div>

<div class="video-card">
<img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
<div class="video-content">
<h3>MOD 2</h3>
<a class="watch-btn">WATCH</a>
</div>
</div>

</div>

<!-- CHALLENGE -->
<div class="challenge">
<h2>7 DAYS STREAM</h2>
<div class="bar"><div class="progress"></div></div>
</div>

<footer>
<p>@phunaeiei3</p>
</footer>

<script>

/* MENU FIX (ไม่พังแน่นอน) */
const menu = document.getElementById("sideMenu");
const overlay = document.getElementById("overlay");
const btn = document.getElementById("menuBtn");

function toggleMenu(){

menu.classList.toggle("active");
overlay.classList.toggle("active");

btn.innerHTML = menu.classList.contains("active") ? "✕" : "☰";

}

function closeMenu(){
menu.classList.remove("active");
overlay.classList.remove("active");
btn.innerHTML = "☰";
}

overlay.addEventListener("click", closeMenu);

/* FOLLOWERS */
let base = 175;
let followers = 175;

function liveFollowers(){

let change = Math.floor(Math.random()*5)-2;
followers += change;

if(followers > base + 1) followers = base + 1;
if(followers < base - 1) followers = base - 1;

document.getElementById("followers").innerText = followers;

setTimeout(liveFollowers, 900);
}

liveFollowers();

/* STARS */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<120;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
d:Math.random()*1
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";

for(let s of stars){
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();

s.y += s.d;

if(s.y > canvas.height){
s.y = 0;
s.x = Math.random()*canvas.width;
}
}
}

function animate(){
draw();
requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
