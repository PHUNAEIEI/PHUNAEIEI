<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PHUNAEIEI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#05010b;
color:white;
font-family:'Poppins',sans-serif;
overflow-x:hidden;
}

/* ================= SPACE BG ================= */

.space-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
overflow:hidden;
z-index:-3;

background:
radial-gradient(circle at top,#2d0050 0%,#12001f 35%,#05010b 100%);
}

/* ================= GLOW ================= */

.glow{
position:absolute;
border-radius:50%;
filter:blur(100px);
opacity:0.45;
animation:float 15s infinite ease-in-out;
}

.glow1{
width:320px;
height:320px;
background:#8b2cff;
top:-100px;
left:-100px;
}

.glow2{
width:260px;
height:260px;
background:#5f2cff;
bottom:-80px;
right:-80px;
animation-delay:3s;
}

.glow3{
width:220px;
height:220px;
background:#c86cff;
top:45%;
left:45%;
animation-delay:6s;
}

@keyframes float{

0%{
transform:translate(0,0) scale(1);
}

25%{
transform:translate(40px,-20px) scale(1.08);
}

50%{
transform:translate(-30px,30px) scale(0.96);
}

75%{
transform:translate(20px,40px) scale(1.03);
}

100%{
transform:translate(0,0) scale(1);
}

}

/* ================= GALAXY ================= */

.galaxy{
position:absolute;

/* อยู่ขอบขวาบนแทนกลางจอ */

top:-120px;
right:-120px;

width:420px;
height:420px;

border-radius:50%;

background:
radial-gradient(circle,
rgba(255,255,255,0.12) 0%,
rgba(180,120,255,0.15) 10%,
rgba(139,44,255,0.18) 25%,
rgba(80,20,160,0.12) 45%,
transparent 70%
);

filter:blur(1px);

animation:galaxySpin 40s linear infinite;

opacity:0.5;
}

/* RINGS */

.galaxy::before,
.galaxy::after{
content:'';

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

border-radius:50%;

border:2px solid rgba(180,120,255,0.15);

}

.galaxy::before{
width:300px;
height:300px;

animation:galaxySpinReverse 25s linear infinite;
}

.galaxy::after{
width:180px;
height:180px;

border-color:rgba(255,255,255,0.18);

animation:galaxySpin 12s linear infinite;
}

/* CORE */

.galaxy-core{
position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:70px;
height:70px;

border-radius:50%;

background:white;

box-shadow:
0 0 25px white,
0 0 60px #b86cff,
0 0 120px #8b2cff;

opacity:0.9;
}

/* ANIMATION */

@keyframes galaxySpin{

from{
transform:translate(-50%,-50%) rotate(0deg);
}

to{
transform:translate(-50%,-50%) rotate(360deg);
}

}

@keyframes galaxySpinReverse{

from{
transform:translate(-50%,-50%) rotate(360deg);
}

to{
transform:translate(-50%,-50%) rotate(0deg);
}

}

/* ================= STARS ================= */

#stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
}

/* ================= NAVBAR ================= */

.navbar{
position:fixed;
top:0;
left:0;
width:100%;

display:flex;
justify-content:space-between;
align-items:center;

padding:10px 15px;

background:rgba(0,0,0,0.45);
backdrop-filter:blur(10px);

border-bottom:1px solid #8b2cff;

z-index:9999;
}

.nav-left{
display:flex;
align-items:center;
gap:10px;
}

.logo-p{
width:36px;
height:36px;

display:flex;
align-items:center;
justify-content:center;

border-radius:10px;

background:#140022;
border:2px solid #8b2cff;

font-family:'Orbitron';
font-size:14px;

box-shadow:0 0 14px #8b2cff;
}

.nav-left h1{
font-size:14px;
font-family:'Orbitron';
letter-spacing:1px;
}

.menu-toggle{
font-size:26px;
cursor:pointer;
}

/* ================= MENU ================= */

.fullscreen-menu{
position:fixed;
top:0;
left:0;

width:100%;
height:100vh;

background:rgba(5,1,11,0.97);
backdrop-filter:blur(14px);

padding:20px;

display:flex;
flex-direction:column;

opacity:0;
pointer-events:none;

transition:0.35s;

z-index:99999;
}

.fullscreen-menu.active{
opacity:1;
pointer-events:auto;
}

.menu-top{
display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:30px;
}

.menu-logo{
width:50px;
height:50px;

display:flex;
align-items:center;
justify-content:center;

border-radius:16px;

background:#140022;
border:2px solid #8b2cff;

font-family:'Orbitron';
font-size:22px;

box-shadow:0 0 18px #8b2cff;
}

.close-btn{
font-size:32px;
cursor:pointer;
}

.menu-title{
font-family:'Orbitron';
font-size:30px;
letter-spacing:4px;
margin-bottom:25px;
}

.menu-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.menu-card{
height:120px;

background:#12001f;

border:1px solid #8b2cff;
border-radius:24px;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

text-decoration:none;
color:white;

transition:0.25s;
}

.menu-card:hover{
transform:scale(1.03);
background:#1b0030;
}

.menu-icon{
font-size:34px;
margin-bottom:10px;
}

.menu-card span{
font-size:13px;
letter-spacing:2px;
font-weight:600;
}

.menu-footer{
margin-top:auto;

text-align:center;

opacity:0.6;
font-size:12px;

padding-top:30px;
}

/* ================= HERO ================= */

.hero{
min-height:78vh;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

text-align:center;

padding:90px 20px 40px;
}

.logo-big{
width:90px;
height:90px;

display:flex;
align-items:center;
justify-content:center;

border-radius:22px;

background:#140022;
border:2px solid #8b2cff;

font-size:36px;
font-family:'Orbitron';

box-shadow:0 0 25px #8b2cff;
}

.hero h2{
margin-top:15px;

font-size:clamp(34px,7vw,62px);

font-family:'Orbitron';
}

.mid-text{
margin-top:10px;

font-size:11px;
letter-spacing:3px;

opacity:0.7;
}

.live-card{
margin-top:18px;

padding:12px 18px;

border-radius:14px;

background:rgba(15,0,30,0.95);

border:1px solid #8b2cff;

box-shadow:0 0 20px rgba(139,44,255,0.2);

font-size:14px;
}

/* ================= STATS ================= */

.section-title{
text-align:center;

font-family:'Orbitron';

margin:10px 0 20px;

font-size:20px;
letter-spacing:2px;
}

.stats-grid{
display:grid;
grid-template-columns:1fr 1fr;

gap:14px;

padding:15px;
}

.stat-card{
background:rgba(15,0,30,0.95);

border:1px solid #8b2cff;
border-radius:22px;

padding:22px 15px;

text-align:center;

box-shadow:0 0 20px rgba(139,44,255,0.12);
}

.stat-card h3{
font-size:12px;
letter-spacing:2px;
opacity:0.7;
margin-bottom:8px;
}

.stat-card p{
font-size:30px;
font-family:'Orbitron';
}

/* ================= FOOTER ================= */

footer{
text-align:center;

padding:30px;

margin-top:20px;

border-top:1px solid #8b2cff;

opacity:0.7;
font-size:13px;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

.galaxy{
width:300px;
height:300px;

top:-80px;
right:-80px;

opacity:0.45;
}

.hero h2{
font-size:34px;
}

.logo-big{
width:72px;
height:72px;
font-size:30px;
}

.stat-card p{
font-size:24px;
}

.menu-card{
height:105px;
}

}

/* ================= SCROLL ================= */

::-webkit-scrollbar{
width:0;
}

</style>
</head>

<body>

<!-- ================= SPACE BG ================= -->

<div class="space-bg">

<div class="glow glow1"></div>
<div class="glow glow2"></div>
<div class="glow glow3"></div>

<!-- GALAXY -->

<div class="galaxy">
<div class="galaxy-core"></div>
</div>

</div>

<!-- ================= STARS ================= -->

<canvas id="stars"></canvas>

<!-- ================= NAVBAR ================= -->

<div class="navbar">

<div class="nav-left">

<div class="logo-p">
P
</div>

<h1>PHUNAEIEI</h1>

</div>

<div class="menu-toggle" onclick="toggleMenu()">
☰
</div>

</div>

<!-- ================= HERO ================= -->

<section class="hero">

<div class="logo-big">
P
</div>

<h2>
PHUNAEIEI
</h2>

<div class="mid-text">
CREATOR • MODS • LIVE STREAM
</div>

<div class="live-card">
🔥 LIVE • 180 Followers
</div>

</section>

<!-- ================= STATS ================= -->

<h2 class="section-title">
STATS
</h2>

<div class="stats-grid">

<div class="stat-card">
<h3>FOLLOWERS</h3>
<p>180</p>
</div>

<div class="stat-card">
<h3>VIDEOS</h3>
<p>6</p>
</div>

<div class="stat-card">
<h3>VIEWS</h3>
<p>10K</p>
</div>

<div class="stat-card">
<h3>DONATIONS</h3>
<p>฿0</p>
</div>

</div>

<!-- ================= FOOTER ================= -->

<footer>
@phunaeiei3
</footer>

<script>

/* ================= STARS ================= */

const c=document.getElementById("stars");
const x=c.getContext("2d");

c.width=window.innerWidth;
c.height=window.innerHeight;

let stars=[];

for(let i=0;i<120;i++){

stars.push({
x:Math.random()*c.width,
y:Math.random()*c.height,
r:Math.random()*1.5
});

}

function draw(){

x.clearRect(0,0,c.width,c.height);

x.fillStyle="white";

for(let s of stars){

x.beginPath();

x.arc(
s.x,
s.y,
s.r,
0,
Math.PI*2
);

x.fill();

s.y += 0.6;

if(s.y > c.height){

s.y = 0;
s.x = Math.random()*c.width;

}

}

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
