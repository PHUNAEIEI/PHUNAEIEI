<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHUNAEIEI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}
body{background:#05010b;color:white;font-family:Poppins;}

.navbar{
position:fixed;top:0;width:100%;
display:flex;justify-content:space-between;
padding:15px 30px;
background:rgba(0,0,0,0.7);
border-bottom:1px solid #8b2cff;
z-index:999;
}

.nav-left{display:flex;align-items:center;gap:12px;}

.nav-left img{
width:50px;height:50px;
border-radius:12px;
border:2px solid #8b2cff;
object-fit:cover;
box-shadow:0 0 15px #8b2cff;
}

.nav-left h1{font-family:Orbitron;color:#f2d4ff;}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1511512578047-dfb367046420');
background-size:cover;
}

.hero img{
width:130px;height:130px;
border-radius:25px;
border:3px solid #8b2cff;
box-shadow:0 0 35px #8b2cff;
object-fit:cover;
}

.hero h2{font-size:70px;font-family:Orbitron;color:#f2d4ff;}

.section-title{
text-align:center;
margin:60px 0 20px;
font-family:Orbitron;
color:#f2d4ff;
font-size:38px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.stat-box{
background:#0d0018;
padding:30px;
border:1px solid #8b2cff;
border-radius:20px;
text-align:center;
}

.stat-box p{
font-size:40px;
color:#d9b3ff;
font-family:Orbitron;
}

/* VIDEO */
.slider{
display:flex;
overflow-x:auto;
gap:20px;
padding:20px;
}

.video-card{
min-width:300px;
background:#0d0018;
border:1px solid #8b2cff;
border-radius:20px;
overflow:hidden;
}

.video-card img{
width:100%;
height:200px;
object-fit:cover;
}

.video-content{padding:15px;}

.watch-btn{
display:inline-block;
margin-top:10px;
background:#8b2cff;
padding:10px 15px;
border-radius:10px;
color:white;
text-decoration:none;
}

.challenge{
margin:30px;
padding:40px;
background:#0d0018;
border:1px solid #8b2cff;
border-radius:25px;
text-align:center;
}

.bar{height:25px;background:#2a1240;border-radius:20px;margin-top:20px;}
.progress{width:72%;height:100%;background:#8b2cff;}

footer{
text-align:center;
padding:40px;
border-top:1px solid #8b2cff;
margin-top:50px;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
<div class="nav-left">

<img src="https://cdn.discordapp.com/attachments/1483287253483782185/1502925774125006901/file_00000000184c720b8882374591789c9b.png?raw=true">

<h1>PHUNAEIEI</h1>

</div>
</div>

<!-- HERO -->
<div class="hero">

<img src="https://cdn.discordapp.com/attachments/1483287253483782185/1502925774125006901/file_00000000184c720b8882374591789c9b.png?raw=true">

<h2>PHUNAEIEI</h2>
<p>MINECRAFT CREATOR</p>

</div>

<!-- STATS -->
<h2 class="section-title">STATS</h2>

<div class="stats">
<div class="stat-box"><h3>FOLLOWERS</h3><p>120K</p></div>
<div class="stat-box"><h3>VIDEOS</h3><p>157</p></div>
<div class="stat-box"><h3>VIEWS</h3><p>9.4M</p></div>
</div>

<!-- VIDEOS (ครบ 4 คลิป) -->
<h2 class="section-title">LATEST VIDEOS</h2>

<div class="slider">

<div class="video-card">
<img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
<div class="video-content">
<h3>1 DAY 1 MOD</h3>
<a class="watch-btn">WATCH</a>
</div>
</div>

<div class="video-card">
<img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
<div class="video-content">
<h3>HORROR MOD</h3>
<a class="watch-btn">WATCH</a>
</div>
</div>

<div class="video-card">
<img src="https://images.unsplash.com/photo-1493711662062-fa541adb3fc8">
<div class="video-content">
<h3>PVP PACK</h3>
<a class="watch-btn">WATCH</a>
</div>
</div>

<div class="video-card">
<img src="https://images.unsplash.com/photo-1560253023-3ec5d502959f">
<div class="video-content">
<h3>LIVE 7 DAYS</h3>
<a class="watch-btn">WATCH</a>
</div>
</div>

</div>

<!-- CHALLENGE -->
<div class="challenge">
<h2>7 DAYS CHALLENGE</h2>
<p>Goal 100K Followers</p>
<div class="bar"><div class="progress"></div></div>
</div>

<!-- FOOTER -->
<footer>
<p>@phunaeiei3</p>
</footer>

</body>
</html>
